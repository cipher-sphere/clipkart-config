server.port=9090
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Gateway Routes
spring.cloud.gateway.routes[0].id=CartService
spring.cloud.gateway.routes[0].uri=lb://CARTSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/cart/**

spring.cloud.gateway.routes[1].id=Inventory
spring.cloud.gateway.routes[1].uri=lb://INVENTORY
spring.cloud.gateway.routes[1].predicates[0]=Path=/inventory/**

spring.cloud.gateway.routes[2].id=Pricing
spring.cloud.gateway.routes[2].uri=lb://PRICING
spring.cloud.gateway.routes[2].predicates[0]=Path=/pricing/**

spring.cloud.gateway.routes[3].id=ProductService
spring.cloud.gateway.routes[3].uri=lb://PRODUCTSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/product/**

spring.cloud.gateway.routes[4].id=Recommendation
spring.cloud.gateway.routes[4].uri=lb://RECOMMENDATION
spring.cloud.gateway.routes[4].predicates[0]=Path=/recommendation/**

# Actuator
management.endpoints.web.exposure.include=*
